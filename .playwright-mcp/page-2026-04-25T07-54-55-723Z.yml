    - generic [ref=e51]:
      - heading "What does hypoallergenic mean for dogs?" [level=2] [ref=e52]
      - generic [ref=e53]:
        - paragraph [ref=e54]: A hypoallergenic diet is one designed to minimise the risk of triggering an allergic reaction. In dogs, food allergies are typically reactions to specific proteins — most commonly beef, dairy, wheat, chicken, and soy. These reactions develop over time with repeated exposure.
        - paragraph [ref=e55]: It's worth noting the difference between a true food allergy (an immune system response) and a food intolerance (a digestive issue). Both can cause discomfort, but allergies tend to also affect the skin and ears, while intolerances are usually limited to gut symptoms.
        - paragraph [ref=e56]: The best approach to managing food-related allergies is an elimination diet using novel or limited ingredients that your dog hasn't been exposed to before, combined with avoiding the artificial additives and fillers that can worsen inflammatory responses.
