        - paragraph [ref=e94]: Diet is the cornerstone of pancreatitis management. A low-fat, highly digestible diet reduces the workload on the pancreas, allowing it to heal and reducing the risk of future episodes. Natural, gently prepared food is far gentler than processed alternatives.
