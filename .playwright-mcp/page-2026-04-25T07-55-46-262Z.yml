          - heading "Vomiting" [level=3] [ref=e64]
          - paragraph [ref=e65]: Repeated vomiting is one of the most common signs. It may come on suddenly and can be severe during an acute episode.
        - generic [ref=e66]:
          - generic [ref=e67]: 😖
          - heading "Abdominal pain" [level=3] [ref=e68]
          - paragraph [ref=e69]: Your dog may hunch over, adopt a 'prayer position' (front end down, back end up), or whimper when their belly is touched.
        - generic [ref=e70]:
          - generic [ref=e71]: 🍽️
          - heading "Loss of appetite" [level=3] [ref=e72]
          - paragraph [ref=e73]: Refusing food or turning away from meals they'd normally enjoy is a key warning sign.
        - generic [ref=e74]:
          - generic [ref=e75]: 😴
          - heading "Lethargy" [level=3] [ref=e76]
          - paragraph [ref=e77]: Unusual tiredness, reluctance to move, or generally seeming 'off' often accompanies pancreatitis.
        - generic [ref=e78]:
          - generic [ref=e79]: 💩
          - heading "Diarrhoea" [level=3] [ref=e80]
          - paragraph [ref=e81]: Loose, greasy-looking stools or diarrhoea may occur alongside vomiting during a flare-up.
        - generic [ref=e82]:
          - generic [ref=e83]: 🌡️
          - heading "Fever" [level=3] [ref=e84]
          - paragraph [ref=e85]: A raised temperature can indicate acute inflammation. If your dog feels unusually warm, contact your vet.
