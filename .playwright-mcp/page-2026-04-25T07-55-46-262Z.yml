    - generic [ref=e51]:
      - heading "What is pancreatitis in dogs?" [level=2] [ref=e52]
      - generic [ref=e53]:
        - paragraph [ref=e54]: Pancreatitis is the inflammation of the pancreas — the organ responsible for producing digestive enzymes and insulin. When inflamed, digestive enzymes activate prematurely and begin to digest the pancreas itself, causing pain and damage.
        - paragraph [ref=e55]: It can range from mild to life-threatening. Acute pancreatitis comes on suddenly and can be a medical emergency, while chronic pancreatitis involves recurring low-grade inflammation over time. Both forms require careful dietary management.
        - paragraph [ref=e56]: High-fat diets are one of the most common triggers. Dogs who eat rich, fatty foods — whether from their regular diet, table scraps, or raiding the bin — are at significantly higher risk. Miniature Schnauzers, Cocker Spaniels, and overweight dogs are particularly prone.
    - generic [ref=e58]:
      - heading "Ուշադրություն դարձրու այս նշաններին" [level=2] [ref=e59]
      - paragraph [ref=e60]: Եթե քո շունը ցույց է տալիս այս ախտանիշներից որևէ մեկը, ճիշտ սնունդը կարող է մեծ փոփոխություն բերել։
      - generic [ref=e61]:
