                      - generic [ref=f8e16]:
                        - paragraph [ref=f8e17]: Առողջություն և սնուցում
                        - heading "Հիպոալերգենիկ շան սնունդ" [level=1] [ref=f8e186]
                        - paragraph [ref=f8e19]: "Սննդային ալերգիաներն ու անհանդուրժողականությունը ազդում են ավելի շատ շների վրա, քան դուք կարող եք մտածել: Բնական, հիպոալերգենային դիետան սահմանափակ բաղադրիչներով կարող է երկարատև թեթևացում բերել:"
                        - link "Ստեղծել քո շան պլանը" [ref=f8e20] [cursor=pointer]:
                          - /url: /auth/signup
                    - generic [ref=f8e22]:
                      - heading "Ի՞նչ է նշանակում հիպոալերգենիկ շների համար:" [level=2] [ref=f8e187]
                      - generic [ref=f8e24]:
                        - paragraph [ref=f8e25]: "Հիպոալերգենային դիետան նախատեսված է նվազագույնի հասցնելու ալերգիկ ռեակցիա առաջացնելու վտանգը: Շների մոտ սննդային ալերգիաները սովորաբար ռեակցիա են հատուկ սպիտակուցների նկատմամբ՝ առավել հաճախ տավարի, կաթնամթերքի, ցորենի, հավի և սոյայի նկատմամբ: Այս ռեակցիաները ժամանակի ընթացքում զարգանում են կրկնակի բացահայտմամբ:"
                        - paragraph [ref=f8e26]: "Արժե նշել, թե որն է իրական սննդային ալերգիայի (իմունային համակարգի արձագանք) և սննդի անհանդուրժողականության (մարսողական խնդիր) տարբերությունը: Երկուսն էլ կարող են անհանգստություն առաջացնել, բայց ալերգիան հակված է նաև ազդել մաշկի և ականջների վրա, մինչդեռ անհանդուրժողականությունը սովորաբար սահմանափակվում է աղիքների ախտանիշներով:"
                        - paragraph [ref=f8e27]: "Սննդի հետ կապված ալերգիաները կառավարելու լավագույն մոտեցումը վերացման դիետան է՝ օգտագործելով նոր կամ սահմանափակ բաղադրիչներ, որոնց ձեր շունը նախկինում չի ենթարկվել՝ զուգորդված խուսափելով արհեստական հավելումներից և լցոնիչներից, որոնք կարող են վատթարացնել բորբոքային ռեակցիաները:"
                    - generic [ref=f8e29]:
                      - heading "Ուշադրություն դարձրու այս նշաններին" [level=2] [ref=f8e30]
                      - paragraph [ref=f8e31]: Եթե քո շունը ցույց է տալիս, որ այս հնարավորությունից կարող է մեկը, ճիշտ սնունդը մեծ փոփոխություն է բերել։
                      - generic [ref=f8e32]:
                        - generic [ref=f8e33]:
                          - generic [ref=f8e34]: 🐾
                          - heading "Մաշկի և թաթերի քոր առաջացում" [level=3] [ref=f8e188]
                          - paragraph [ref=f8e36]: "Անընդհատ քորելը, թաթերը լիզելը կամ դեմքը կահույքին քսելը սննդային ալերգիայի դասական նշաններ են:"
                        - generic [ref=f8e37]:
                          - generic [ref=f8e38]: 👂
                          - heading "Կրկնվող ականջի վարակներ" [level=3] [ref=f8e189]
                          - paragraph [ref=f8e40]: "Ականջի քրոնիկ ինֆեկցիաները, որոնք անընդհատ հայտնվում են, նույնիսկ բուժման դեպքում, հաճախ կապված են սննդի նկատմամբ զգայունության հետ:"
                        - generic [ref=f8e41]:
                          - generic [ref=f8e42]: 🔴
                          - heading "Կարմիր, բորբոքված մաշկ" [level=3] [ref=f8e190]
                          - paragraph [ref=f8e44]: "Թեժ կետեր, ցան կամ կարմրած մաշկ, հատկապես որովայնի, աճուկի և թեւատակերի շրջանում:"
                        - generic [ref=f8e45]:
                          - generic [ref=f8e46]: 💩
                          - heading "Մարսողական խանգարում" [level=3] [ref=f8e191]
                          - paragraph [ref=f8e48]: "Կղանքը, ավելորդ գազը կամ փսխումը մաշկային ախտանիշների հետ մեկտեղ կարող են վկայել սննդային ալերգիայի մասին:"
                        - generic [ref=f8e49]:
                          - generic [ref=f8e50]: 🦠
                          - heading "Մաշկի վարակներ" [level=3] [ref=f8e192]
                          - paragraph [ref=f8e52]: "Կրկնվող բակտերիալ կամ խմորիչ մաշկի վարակները կարող են պայմանավորված լինել սննդի նկատմամբ հիմքում ընկած ալերգիկ արձագանքով:"
                        - generic [ref=f8e53]:
                          - generic [ref=f8e54]: 😿
                          - heading "Ձանձրալի, շերտավոր վերարկու" [level=3] [ref=f8e193]
                          - paragraph [ref=f8e56]: "Վերարկուն, որը կորցրել է իր փայլը, թեփով կամ չափից դուրս թափվելով, կարող է մատնանշել դիետիկ խնդիրները:"
                    - generic [ref=f8e58]:
                      - img "Natural dog food" [ref=f8e60]
                      - generic [ref=f8e62]:
                        - heading "Relief միջոցով" [level=2] [ref=f8e194]
                        - paragraph [ref=f8e64]: ճիշտ սնուցման միջոցով
                        - paragraph [ref=f8e65]: "Շատ առևտրային շների կերակուրներ պարունակում են բաղադրիչների երկար ցուցակ, որոնցից որևէ մեկը կարող է ռեակցիա առաջացնել: Բնական, սահմանափակ բաղադրիչներով դիետան հեշտացնում է խնդրահարույց մթերքների հայտնաբերումը և վերացումը՝ միաժամանակ ապահովելով ամբողջական, հավասարակշռված սնուցում:"
                        - generic [ref=f8e66]:
                          - generic [ref=f8e67]:
                            - img [ref=f8e69]
                            - generic [ref=f8e71]:
                              - paragraph [ref=f8e72]: Սահմանափակ, թափանցիկ բաղադրիչներ
                              - paragraph [ref=f8e73]: "Ավելի քիչ բաղադրիչներ նշանակում են ավելի քիչ պոտենցիալ հրահրողներ: Յուրաքանչյուր բաղադրիչ նշված է հստակ՝ առանց թաքնված տհաճությունների:"
                          - generic [ref=f8e74]:
                            - img [ref=f8e76]
                            - generic [ref=f8e78]:
                              - paragraph [ref=f8e79]: Սպիտակուցի նոր տարբերակներ
                              - paragraph [ref=f8e80]: "Սպիտակուցներ, ինչպիսիք են բադը, որսը և սաղմոնը, որոնք շատ շներ նախկինում չէին կերել, ինչը նվազեցնում է առկա զգայունության հավանականությունը:"
                          - generic [ref=f8e81]:
                            - img [ref=f8e83]
                            - generic [ref=f8e85]:
                              - paragraph [ref=f8e86]: Ընդհանուր ալերգեններ չկան
                              - paragraph [ref=f8e87]: "Բաղադրատոմսեր, որոնք զերծ են ընդհանուր խթանիչներից, ինչպիսիք են տավարի միսը, կաթնամթերքը, ցորենը, սոյան և արհեստական հավելումները:"
                          - generic [ref=f8e88]:
                            - img [ref=f8e90]
                            - generic [ref=f8e92]:
                              - paragraph [ref=f8e93]: Հակաբորբոքային սնուցիչներ
                              - paragraph [ref=f8e94]: "Բնական օմեգա ճարպաթթուները և իրական բաղադրիչներից ստացված հակաօքսիդանտները օգնում են հանգստացնել բորբոքային պատասխանները:"
