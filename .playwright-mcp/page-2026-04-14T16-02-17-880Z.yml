    - generic [ref=e35]:
      - heading "Shipping & Delivery Policy" [level=1] [ref=e36]
      - paragraph [ref=e37]: Everything you need to know about how we deliver fresh, natural dog food straight to your door across the United Kingdom.
    - generic [ref=e39]:
      - paragraph [ref=e40]: "Last updated: March 2026"
      - generic [ref=e41]:
        - heading "1. Delivery Overview" [level=2] [ref=e42]
        - paragraph [ref=e43]: At Jeko, we are committed to delivering fresh, natural pet food to homes across the United Kingdom. Every order is carefully prepared in our Yorkshire kitchen using real, human-grade ingredients and dispatched to arrive in peak condition at your doorstep.
        - paragraph [ref=e44]: Whether you are placing a one-off order or receiving regular subscription deliveries, we work with trusted courier partners to ensure your dog's meals arrive safely, on time, and at the right temperature. Our delivery service covers England, Wales, Scotland, and Northern Ireland, with some variations in timescales and charges depending on your location.
        - paragraph [ref=e45]: We dispatch orders Monday to Friday (excluding bank holidays). Orders placed over the weekend will be processed on the next available working day to ensure maximum freshness upon arrival.
      - generic [ref=e46]:
        - heading "2. Delivery Options" [level=2] [ref=e47]
        - paragraph [ref=e48]: "We offer a range of delivery options to suit your schedule and budget. Choose the service that works best for you and your pup:"
        - generic [ref=e49]:
          - generic [ref=e51]:
            - img [ref=e53]
            - generic [ref=e55]:
              - heading "Standard Delivery" [level=3] [ref=e56]
              - paragraph [ref=e57]: 3-5 business days
              - paragraph [ref=e58]: Free on orders over £25
              - paragraph [ref=e59]: £3.99 for orders under £25
          - generic [ref=e61]:
            - img [ref=e63]
            - generic [ref=e65]:
              - heading "Express Delivery" [level=3] [ref=e66]
              - paragraph [ref=e67]: 1-2 business days
              - paragraph [ref=e68]: £4.99
              - paragraph [ref=e69]: On all orders
          - generic [ref=e71]:
            - img [ref=e73]
            - generic [ref=e75]:
              - heading "Next Day Delivery" [level=3] [ref=e76]
              - paragraph [ref=e77]: Next working day
              - paragraph [ref=e78]: £6.99
              - paragraph [ref=e79]: Order before 2pm Mon-Fri
          - generic [ref=e80]:
            - generic [ref=e81]: Most Popular
            - generic [ref=e82]:
              - img [ref=e84]
              - generic [ref=e86]:
                - heading "Subscription Delivery" [level=3] [ref=e87]
                - paragraph [ref=e88]: Flexible schedule
                - paragraph [ref=e89]: Always FREE
                - paragraph [ref=e90]: On every delivery, every time
        - paragraph [ref=e91]: All delivery timescales quoted above are estimated and commence from the point of dispatch, not from when the order is placed. During peak periods, delivery times may be slightly longer than usual. We will always keep you informed of any delays.
        - paragraph [ref=e92]:
          - strong [ref=e93]: "Please note:"
          - text: Next Day Delivery is available for orders placed before 2:00pm GMT/BST, Monday to Friday. Orders placed after 2:00pm on Friday will be dispatched the following Monday and delivered on Tuesday.
      - generic [ref=e94]:
        - heading "3. Subscription Deliveries" [level=2] [ref=e95]
        - paragraph [ref=e96]: Our subscription service is the most convenient and cost-effective way to keep your dog fed with fresh, natural food. When you sign up for a Jeko plan, your deliveries are completely tailored to your dog's needs and your household schedule.
        - paragraph [ref=e97]:
          - strong [ref=e98]: "Delivery frequency options:"
        - list [ref=e99]:
          - listitem [ref=e100]:
            - strong [ref=e101]: Every 2 weeks
            - text: — ideal for small dogs or multi-dog households that go through food quickly
          - listitem [ref=e102]:
            - strong [ref=e103]: Every 4 weeks
            - text: — our most popular option, perfect for most dogs
          - listitem [ref=e104]:
            - strong [ref=e105]: Every 6 weeks
            - text: — great for larger orders or dogs with lower daily intake
          - listitem [ref=e106]:
            - strong [ref=e107]: Every 8 weeks
            - text: — maximum flexibility for those who like to stock up
        - paragraph [ref=e108]: All subscription deliveries ship completely free of charge, regardless of order value. You will receive a reminder email 3 days before each scheduled delivery so you always know when to expect your next box.
        - paragraph [ref=e109]:
          - strong [ref=e110]: "Pausing and skipping:"
          - text: Life happens, and we understand that. You can pause your subscription at any time through your online account. Simply log in, navigate to your subscription settings, and choose to skip your next delivery or pause your plan for a set period. You can also adjust your delivery date, change your delivery frequency, or update your delivery address — all from your account dashboard. There are no penalties or fees for pausing or skipping deliveries.
        - paragraph [ref=e111]:
          - strong [ref=e112]: "Cancelling:"
          - text: If you wish to cancel your subscription entirely, you can do so at any time via your account or by contacting our customer care team. Any order already dispatched at the time of cancellation will still be delivered.
      - generic [ref=e113]:
        - heading "4. Packaging & Freshness" [level=2] [ref=e114]
        - paragraph [ref=e115]: We take great care to ensure your dog's food arrives in perfect condition. Freshness is at the heart of everything we do, and our packaging is designed to protect both your food and the environment.
        - list [ref=e117]:
          - listitem [ref=e118]:
            - generic [ref=e119]: ✓
            - generic [ref=e120]:
              - strong [ref=e121]: "Insulated boxes:"
              - text: All fresh food orders are packed in thermally insulated boxes to maintain the correct temperature during transit, even in warmer months.
          - listitem [ref=e122]:
            - generic [ref=e123]: ✓
            - generic [ref=e124]:
              - strong [ref=e125]: "Ice packs:"
              - text: Non-toxic, food-safe ice packs are included with every fresh food delivery to keep meals chilled from our kitchen to your door.
          - listitem [ref=e126]:
            - generic [ref=e127]: ✓
            - generic [ref=e128]:
              - strong [ref=e129]: "Recyclable materials:"
              - text: Our outer boxes are made from 100% recyclable cardboard. We are continually working to reduce our packaging footprint and move towards fully sustainable materials.
          - listitem [ref=e130]:
            - generic [ref=e131]: ✓
            - generic [ref=e132]:
              - strong [ref=e133]: "Eco-friendly liners:"
              - text: Our insulated liners are made from recycled materials and can be recycled again after use. Simply separate the components and place them in your household recycling bin.
          - listitem [ref=e134]:
            - generic [ref=e135]: ✓
            - generic [ref=e136]:
              - strong [ref=e137]: "Air-dried food:"
              - text: Our air-dried recipes are shipped in resealable, lightweight pouches that require no refrigeration, making them convenient to store and easy on the environment.
        - paragraph [ref=e138]: Upon receiving your order, we recommend placing fresh food in the refrigerator within 2 hours. Unopened pouches of air-dried food can be stored in a cool, dry place for up to 12 months. Please check individual product labels for specific storage instructions.
      - generic [ref=e139]:
        - heading "5. Delivery Areas" [level=2] [ref=e140]
        - paragraph [ref=e141]: "We currently deliver to addresses throughout the United Kingdom. Below is a summary of our coverage and any applicable surcharges:"
        - table [ref=e143]:
          - rowgroup [ref=e144]:
            - row "Region Availability Additional Charges" [ref=e145]:
