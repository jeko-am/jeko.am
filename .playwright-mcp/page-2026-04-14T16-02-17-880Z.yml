              - cell "Channel Islands & Isle of Man" [ref=e167]
              - cell "Standard only" [ref=e168]
              - cell "£4.99 surcharge" [ref=e169]
        - paragraph [ref=e170]:
          - strong [ref=e171]: "International shipping:"
          - text: Unfortunately, we do not currently offer international delivery. We are a UK-based company and our fresh food is prepared and shipped from our kitchen in Yorkshire. We are actively exploring options to expand our delivery reach in the future, so please check back for updates.
        - paragraph [ref=e172]:
          - strong [ref=e173]: "BFPO addresses:"
          - text: We are unable to deliver to British Forces Post Office addresses at this time due to the perishable nature of our fresh food products.
      - generic [ref=e174]:
        - heading "6. Tracking Your Order" [level=2] [ref=e175]
        - paragraph [ref=e176]: "We believe you should always know exactly where your order is. That is why we provide comprehensive tracking at every stage of the delivery process:"
        - list [ref=e177]:
          - listitem [ref=e178]:
            - strong [ref=e179]: "Order confirmation:"
            - text: You will receive an email immediately after placing your order, confirming the details and estimated delivery date.
          - listitem [ref=e180]:
            - strong [ref=e181]: "Dispatch notification:"
            - text: Once your order leaves our kitchen, you will receive a dispatch email containing a unique tracking number and a link to track your parcel in real time.
          - listitem [ref=e182]:
            - strong [ref=e183]: "SMS updates:"
            - text: If you have provided a mobile number, you will receive text message updates on the day of delivery, including an estimated delivery window.
          - listitem [ref=e184]:
            - strong [ref=e185]: "Real-time tracking:"
            - text: Use the tracking link provided in your dispatch email to monitor your delivery in real time via our courier partner's website or app.
          - listitem [ref=e186]:
            - strong [ref=e187]: "Delivery confirmation:"
            - text: You will receive a final notification once your parcel has been successfully delivered, including a photo of where it was left if applicable.
        - paragraph [ref=e188]: You can also check the status of your order at any time by logging into your Jeko account and visiting the “My Orders” section.
      - generic [ref=e189]:
        - heading "7. Delivery Issues" [level=2] [ref=e190]
        - paragraph [ref=e191]: "While we strive for a seamless delivery experience every time, we understand that issues can occasionally arise. Here is how we handle common delivery problems:"
        - heading "Missed Delivery" [level=3] [ref=e192]
        - paragraph [ref=e193]: If you are not home when our courier attempts delivery, they will leave a card with instructions on how to arrange redelivery or collect your parcel from a local depot. In most cases, the courier will attempt to leave your order in a safe place or with a neighbour (unless you have instructed otherwise). If you have specified safe place instructions in your account, the courier will follow them.
        - heading "Damaged Goods" [level=3] [ref=e194]
        - paragraph [ref=e195]: If your order arrives damaged, please contact our customer care team within 48 hours of delivery. We will ask you to provide photographs of the damage to help us investigate. In the vast majority of cases, we will arrange a full replacement or refund at no additional cost to you. We take damaged deliveries seriously and work closely with our courier partners to prevent recurrence.
        - heading "Wrong Items" [level=3] [ref=e196]
        - paragraph [ref=e197]: If you receive incorrect items, please get in touch with us as soon as possible. We will arrange for the correct items to be sent out to you promptly, and we will cover any costs associated with returning the incorrect items. You are under no obligation to return wrong items — in many cases, we will simply ask you to donate them to a local animal charity if the food is still sealed and safe.
        - heading "Late Delivery" [level=3] [ref=e198]
        - paragraph [ref=e199]: If your order has not arrived within the expected timeframe, please first check your tracking information for the latest status. Occasionally, delays can occur due to adverse weather conditions, courier operational issues, or high demand periods. If your order is significantly delayed (more than 2 working days beyond the expected delivery date), please contact our team and we will investigate and resolve the issue as quickly as possible. Where a paid delivery service has been significantly delayed, we will refund the delivery charge.
      - generic [ref=e200]:
        - heading "8. Failed Deliveries & Redelivery" [level=2] [ref=e201]
        - paragraph [ref=e202]: If delivery cannot be completed after two attempts, your parcel will be held at the courier's local depot for up to 7 days. You can arrange collection or redelivery through the courier's website using the tracking number provided.
        - paragraph [ref=e203]: If the parcel is not collected within 7 days, it will be returned to us. Please note that due to the perishable nature of our fresh food products, we may not be able to resend returned parcels if they have been out of the cold chain for an extended period. In such cases, we will contact you to arrange a fresh replacement order.
        - paragraph [ref=e204]: If a delivery fails due to an incorrect or incomplete address provided at checkout, we may need to charge an additional delivery fee for re-dispatch. We strongly recommend double-checking your delivery address before completing your order. You can update your default delivery address at any time via your account settings.
      - generic [ref=e205]:
        - heading "9. Delivery to Alternative Addresses" [level=2] [ref=e206]
        - paragraph [ref=e207]: "We want to make sure your order reaches you even when you are not available to receive it in person. Here are the options available:"
        - heading "Safe Place Delivery" [level=3] [ref=e208]
        - paragraph [ref=e209]: You can nominate a safe place for your delivery to be left if you are not at home. This could be a porch, garage, outbuilding, or any sheltered spot accessible to the courier. Simply add safe place instructions to your delivery preferences in your account settings or at checkout. Please note that once a parcel is left in your nominated safe place, responsibility for the delivery passes to you.
        - heading "Neighbour Delivery" [level=3] [ref=e210]
        - paragraph [ref=e211]:
          - text: If you are not available, you can authorise the courier to leave your parcel with a neighbour. You can specify a preferred neighbour in your delivery instructions. The courier will leave a notification card to let you know where your parcel has been left. If you would prefer that your parcel is
          - emphasis [ref=e212]: not
          - text: left with a neighbour, you can indicate this in your delivery preferences.
        - heading "Alternative Delivery Address" [level=3] [ref=e213]
        - paragraph [ref=e214]: You can choose to have your order delivered to a different address, such as your workplace or a family member's home. Simply update the delivery address at checkout or in your subscription settings. For subscription customers, you can set a permanent alternative address or change the address on a per-delivery basis.
      - generic [ref=e215]:
        - heading "10. Bank Holidays & Peak Periods" [level=2] [ref=e216]
        - paragraph [ref=e217]: Please be aware that our dispatch and delivery schedules are affected by UK bank holidays. We do not dispatch orders on bank holidays, and courier services may also be limited on these days. Orders placed on or just before a bank holiday may experience a delay of 1–2 additional working days.
        - paragraph [ref=e218]: During peak periods — such as the Christmas and New Year season, Easter, and Black Friday/Cyber Monday — delivery times across all services may be extended due to higher volumes across the courier network. We recommend placing orders a few days earlier than usual during these periods to ensure timely arrival.
        - paragraph [ref=e219]: For subscription customers, we automatically adjust dispatch dates around bank holidays and peak periods to ensure your delivery arrives as close to your regular schedule as possible. You will be notified by email if there are any changes to your expected delivery date.
        - paragraph [ref=e220]:
          - strong [ref=e221]: "Key dates to be aware of:"
          - text: Christmas Eve to New Year's Day (limited courier operations), Easter weekend, early May bank holiday, late May bank holiday, and the August bank holiday.
      - generic [ref=e222]:
        - heading "11. Contact Our Delivery Team" [level=2] [ref=e223]
        - paragraph [ref=e224]: "If you have any questions, concerns, or issues regarding your delivery, our friendly customer care team is here to help. You can reach us through any of the following channels:"
        - list [ref=e226]:
          - listitem [ref=e227]:
            - generic [ref=e228]: ✉
            - generic [ref=e229]:
              - strong [ref=e230]: "Email:"
              - text: delivery@jeko.am — we aim to respond within 24 hours
          - listitem [ref=e231]:
            - generic [ref=e232]: ☎
            - generic [ref=e233]:
              - strong [ref=e234]: "Phone:"
              - text: 0800 083 6696 — Monday to Friday, 9:00am to 5:30pm GMT
          - listitem [ref=e235]:
            - generic [ref=e236]: 💬
            - generic [ref=e237]:
              - strong [ref=e238]: "Live chat:"
              - text: Available on our website during business hours for instant support
          - listitem [ref=e239]:
            - generic [ref=e240]: 👤
            - generic [ref=e241]:
              - strong [ref=e242]: "Your account:"
              - text: Log in and visit “Help & Support” to raise a delivery enquiry directly
        - paragraph [ref=e243]: When contacting us about a delivery issue, please have your order number and tracking number to hand so we can assist you as quickly as possible.
        - paragraph [ref=e244]: We are passionate about making sure every delivery experience is as smooth as the food inside the box. Thank you for choosing Jeko — we are glad to be part of your pet's journey to better health.
