    - generic [ref=e51]:
      - heading "What is colitis in dogs?" [level=2] [ref=e52]
      - generic [ref=e53]:
        - paragraph [ref=e54]: Colitis refers to inflammation of the colon (large intestine). It can be acute, meaning it comes on suddenly and resolves quickly, or chronic, where symptoms persist over weeks or months. It affects dogs of all ages and breeds.
        - paragraph [ref=e55]: The condition disrupts normal water absorption in the colon, leading to loose stools, urgency, and discomfort. While it can have many triggers — from stress and infections to dietary intolerances — what your dog eats plays a central role in managing it.
        - paragraph [ref=e56]: Many dogs with colitis see significant improvement simply by switching to a gentle, natural diet that avoids common inflammatory ingredients found in highly processed kibble.
    - generic [ref=e58]:
