          - heading "Can't feel ribs easily" [level=3] [ref=e68]
          - paragraph [ref=e69]: You should be able to feel your dog's ribs with gentle pressure. If you need to press firmly, there's likely excess fat covering them.
        - generic [ref=e70]:
          - generic [ref=e71]: 😮‍💨
          - heading "Getting tired quickly" [level=3] [ref=e72]
          - paragraph [ref=e73]: If your dog tires easily on walks, pants heavily, or seems reluctant to exercise, excess weight may be the cause.
        - generic [ref=e74]:
          - generic [ref=e75]: 🐌
          - heading "Difficulty moving" [level=3] [ref=e76]
          - paragraph [ref=e77]: Struggling to get up, reluctance to climb stairs, or stiffness after rest can indicate weight-related joint strain.
        - generic [ref=e78]:
          - generic [ref=e79]: 😴
          - heading "Sleeping more" [level=3] [ref=e80]
          - paragraph [ref=e81]: Overweight dogs often sleep more and show less interest in play and activity than they used to.
        - generic [ref=e82]:
