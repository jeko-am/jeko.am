    - generic [ref=e51]:
      - heading "Why weight matters for your dog" [level=2] [ref=e52]
      - generic [ref=e53]:
        - paragraph [ref=e54]: Obesity is now the most common nutritional disorder in dogs. Studies suggest that over 50% of dogs in the UK are carrying excess weight. It's a serious health issue that can shorten your dog's life by up to two years and significantly reduce their quality of life.
        - paragraph [ref=e55]: Carrying extra weight puts strain on joints, increases the risk of diabetes, heart disease, and certain cancers, and makes breathing harder — especially for flat-faced breeds. Even being slightly overweight can have a measurable impact on mobility and energy levels.
        - paragraph [ref=e56]: "The cause is almost always simple: too many calories in, not enough energy out. But the type of food matters enormously too. Highly processed foods with fillers and low-quality carbohydrates can leave dogs feeling hungry even when they've eaten enough calories, leading to overeating."
    - generic [ref=e58]:
      - heading "Ուշադրություն դարձրու այս նշաններին" [level=2] [ref=e59]
      - paragraph [ref=e60]: Եթե քո շունը ցույց է տալիս այս ախտանիշներից որևէ մեկը, ճիշտ սնունդը կարող է մեծ փոփոխություն բերել։
      - generic [ref=e61]:
