          - heading "No visible waist" [level=3] [ref=e64]
          - paragraph [ref=e65]: When viewed from above, a healthy dog should have a visible waist behind the ribs. If the body is oval or barrel-shaped, they may be overweight.
        - generic [ref=e66]:
