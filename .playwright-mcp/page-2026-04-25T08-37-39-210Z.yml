                      - generic [ref=f4e16]:
                        - paragraph [ref=f4e17]: Health & Nutrition
                        - heading "Colitis in dogs & how diet can help" [level=1] [ref=f4e18]
                        - paragraph [ref=f4e19]: Colitis is one of the most common digestive conditions in dogs. The right nutrition can reduce flare-ups and support your dog's gut health naturally.
                        - link "Create your dog's plan" [ref=f4e186] [cursor=pointer]:
                          - /url: /auth/signup
                    - generic [ref=f4e22]:
                      - heading "What is colitis in dogs?" [level=2] [ref=f4e23]
                      - generic [ref=f4e24]:
                        - paragraph [ref=f4e25]: Colitis refers to inflammation of the colon (large intestine). It can be acute, meaning it comes on suddenly and resolves quickly, or chronic, where symptoms persist over weeks or months. It affects dogs of all ages and breeds.
                        - paragraph [ref=f4e26]: The condition disrupts normal water absorption in the colon, leading to loose stools, urgency, and discomfort. While it can have many triggers — from stress and infections to dietary intolerances — what your dog eats plays a central role in managing it.
                        - paragraph [ref=f4e27]: Many dogs with colitis see significant improvement simply by switching to a gentle, natural diet that avoids common inflammatory ingredients found in highly processed kibble.
                    - generic [ref=f4e29]:
                      - heading "Signs to look out for" [level=2] [ref=f4e187]
                      - paragraph [ref=f4e31]: If your dog is showing any of these symptoms, their diet could make a real difference.
                      - generic [ref=f4e32]:
                        - generic [ref=f4e33]:
                          - generic [ref=f4e34]: 💩
                          - heading "Soft or watery stools" [level=3] [ref=f4e35]
                          - paragraph [ref=f4e36]: Frequent loose stools, often with mucus or small amounts of bright red blood, are the hallmark sign of colitis.
                        - generic [ref=f4e37]:
                          - generic [ref=f4e38]: 😣
                          - heading "Straining to go" [level=3] [ref=f4e39]
                          - paragraph [ref=f4e40]: Your dog may strain or take longer than usual when going to the toilet, even if very little is produced.
                        - generic [ref=f4e41]:
                          - generic [ref=f4e42]: 🚨
                          - heading "Increased urgency" [level=3] [ref=f4e43]
                          - paragraph [ref=f4e44]: Needing to go outside more frequently or having accidents indoors can indicate colon inflammation.
                        - generic [ref=f4e45]:
                          - generic [ref=f4e46]: 😔
                          - heading "Flatulence & discomfort" [level=3] [ref=f4e47]
                          - paragraph [ref=f4e48]: Excessive gas, rumbling stomach sounds, and general signs of tummy discomfort are common.
                        - generic [ref=f4e49]:
                          - generic [ref=f4e50]: 🍽️
                          - heading "Reduced appetite" [level=3] [ref=f4e51]
                          - paragraph [ref=f4e52]: Some dogs may eat less or show reluctance at mealtimes when experiencing a flare-up.
                        - generic [ref=f4e53]:
                          - generic [ref=f4e54]: 😴
                          - heading "Lethargy" [level=3] [ref=f4e55]
                          - paragraph [ref=f4e56]: During episodes, your dog may seem more tired than usual and less interested in play or walks.
                    - generic [ref=f4e58]:
                      - img "Natural dog food" [ref=f4e60]
                      - generic [ref=f4e62]:
                        - heading "Managing colitis with" [level=2] [ref=f4e63]
                        - paragraph [ref=f4e64]: the right nutrition
                        - paragraph [ref=f4e65]: Diet is considered one of the most important factors in managing colitis. Highly processed foods with artificial additives, fillers, and low-quality proteins can aggravate the colon lining. A natural, gently prepared diet is far easier on the gut.
                        - generic [ref=f4e66]:
                          - generic [ref=f4e67]:
                            - img [ref=f4e69]
                            - generic [ref=f4e71]:
                              - paragraph [ref=f4e72]: Highly digestible ingredients
                              - paragraph [ref=f4e73]: Natural whole foods are gentler on inflamed gut tissue than heavily processed alternatives.
                          - generic [ref=f4e74]:
                            - img [ref=f4e76]
                            - generic [ref=f4e78]:
                              - paragraph [ref=f4e79]: No artificial additives
                              - paragraph [ref=f4e80]: Removing preservatives, colourings, and flavour enhancers eliminates common irritation triggers.
                          - generic [ref=f4e81]:
                            - img [ref=f4e83]
                            - generic [ref=f4e85]:
                              - paragraph [ref=f4e86]: Quality single-source protein
                              - paragraph [ref=f4e87]: Single protein recipes help identify and avoid specific ingredients that may cause reactions.
                          - generic [ref=f4e88]:
                            - img [ref=f4e90]
                            - generic [ref=f4e92]:
                              - paragraph [ref=f4e93]: Natural fibre balance
                              - paragraph [ref=f4e94]: The right blend of soluble and insoluble fibre supports healthy colon function and stool consistency.
                    - generic [ref=f4e96]:
                      - img "Rachel & Poppy" [ref=f4e98]
                      - blockquote [ref=f4e99]: “Our Labrador suffered with colitis for over a year. We tried multiple prescription diets with little improvement. Within two weeks of switching to natural food, the difference was remarkable. No more runny stools, no more midnight dashes to the garden. She's like a different dog.”
