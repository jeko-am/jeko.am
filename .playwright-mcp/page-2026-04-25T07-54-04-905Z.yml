    - generic [ref=e51]:
      - heading "Understanding digestive issues in dogs" [level=2] [ref=e52]
      - generic [ref=e53]:
        - paragraph [ref=e54]: Digestive issues in dogs cover a wide range of symptoms — from occasional upset stomachs to chronic conditions like irritable bowel syndrome (IBS), food sensitivities, and malabsorption. They can affect the stomach, small intestine, large intestine, or a combination.
        - paragraph [ref=e55]: "Many digestive problems are directly linked to diet. Highly processed commercial foods often contain ingredients that are difficult for dogs to break down: artificial preservatives, low-quality meat meals, excessive fillers, and ingredients produced through high-temperature extrusion."
        - paragraph [ref=e56]: The good news is that many dogs with chronic digestive issues see dramatic improvement when switched to a natural, minimally processed diet made from real, recognisable ingredients.
    - generic [ref=e58]:
